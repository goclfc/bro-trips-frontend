server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # cache hashed assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: every route serves index.html so React Router can handle it
    location / {
        try_files $uri $uri/ /index.html;
    }
}
